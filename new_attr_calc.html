<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/MaplestoryWiki/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="/MaplestoryWiki/favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>属性计算器</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #f0f9ff, #e0f7fa);
            color: #000;
            margin: 0;
            padding: 10px;
            font-weight: bold;
        }

        .content {
            background: transparent;
        }

        h1 {
            text-align: center;
            color: #000;
            font-size: 22px;
            margin: 6px 0 10px;
        }

        .subtitle {
            text-align: center;
            margin: 0 0 16px;
            font-size: 13px;
            color: #000;
            opacity: 0.8;
            font-weight: bold;
        }

        .calc-layout {
            max-width: 1500px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            align-items: start;
        }

        .calc-layout.with-equip {
            grid-template-columns: 1fr 360px;
        }

        .calc-card {
            background-color: #ffffffcc;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
            padding: 12px;
        }

        .calc-card h2 {
            margin: 0 0 10px;
            font-size: 16px;
            color: #000;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 8px 10px;
            padding: 6px 0;
        }

        .search-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-row #characterName {
            flex: 1 1 auto;
            min-width: 0;
            width: auto;
        }

        .search-row .btn {
            flex: 0 0 auto;
            white-space: nowrap;
        }

        .form-row label {
            font-weight: bold;
            color: #000;
            font-size: 14px;
            flex: 1 1 260px;
        }

        input[type="text"],
        input[type="password"] {
            padding: 6px 8px;
            border: 1px solid #b2dfdb;
            border-radius: 6px;
            width: 320px;
            font-size: 14px;
            font-weight: bold;
            color: #000;
            transition: border-color 0.3s;
        }

        #characterName {
            width: 100%;
            box-sizing: border-box;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #00796b;
            outline: none;
        }

        .status {
            margin-top: 8px;
            font-size: 12px;
            font-weight: bold;
            white-space: pre-wrap;
        }

        .status.error {
            color: #b00020;
        }

        .character-card {
            margin-top: 10px;
        }

        #characterImage {
            width: 120px;
            height: 120px;
            object-fit: contain;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.6);
        }

        .basic-panel {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 12px;
            align-items: start;
        }

        .basic-fields {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            align-content: start;
        }

        .pill {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(178, 223, 219, 0.9);
        }

        .pill .label {
            opacity: 0.75;
            font-size: 13px;
        }

        .pill .value {
            font-size: 14px;
        }

        .stats-panel {
            margin-top: 12px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(178, 223, 219, 0.9);
            padding: 12px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        #equipDetailGrid {
            grid-template-columns: 1fr;
        }

        .panel-title {
            font-size: 14px;
            margin: 0 0 10px;
            opacity: 0.85;
        }

        .equip-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 33px);
            gap: 8px;
        }

        .equip-tiles {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 10px;
        }

        .equip-tile {
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(178, 223, 219, 0.9);
            border-radius: 14px;
            padding: 10px;
        }

        .equip-tile-header {
            display: grid;
            grid-template-columns: 40px 1fr;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }

        .equip-tile-name {
            font-size: 14px;
            line-height: 1.2;
        }

        .equip-tile-sub {
            font-size: 12px;
            opacity: 0.75;
            margin-top: 2px;
        }

        .equip-stat-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
            font-size: 12px;
            line-height: 1.25;
        }

        .equip-stat-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .equip-stat-row .k {
            opacity: 0.75;
            white-space: nowrap;
        }

        .equip-stat-row .v {
            text-align: right;
            overflow-wrap: anywhere;
            flex: 1;
        }

        .equip-item {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 33px;
            height: 30px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.85);
            border: none;
        }

        .symbol-tiles {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 10px;
        }

        .symbol-tile {
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(178, 223, 219, 0.9);
            border-radius: 14px;
            padding: 10px;
        }

        .symbol-header {
            display: grid;
            grid-template-columns: 40px 1fr;
            gap: 10px;
            align-items: center;
            margin-bottom: 8px;
        }

        .symbol-icon {
            width: 33px;
            height: 30px;
            display: block;
            object-fit: contain;
            border-radius: 6px;
        }

        .symbol-name {
            font-size: 14px;
            line-height: 1.2;
        }

        .equip-item.grade-special,
        .equip-tile.grade-special {
            border: 2px solid #1e88e5;
        }

        .equip-item.grade-rare,
        .equip-tile.grade-rare {
            border: 2px solid #8e24aa;
        }

        .equip-item.grade-epic,
        .equip-tile.grade-epic {
            border: 2px solid #f9a825;
        }

        .equip-item.grade-legendary,
        .equip-tile.grade-legendary {
            border: 2px solid #43a047;
        }

        .equip-breakdown .part-base {
            color: #000000b3;
        }

        .equip-breakdown .part-starforce {
            color: #f9a825;
        }

        .equip-breakdown .part-scroll {
            color: #43a047;
        }

        .equip-breakdown .part-add {
            color: #1e88e5;
        }

        .equip-icon {
            width: 33px;
            height: 30px;
            display: block;
            object-fit: contain;
            border-radius: 6px;
        }

        .stat-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(178, 223, 219, 0.9);
            font-size: 13px;
        }

        .stat-box .k {
            opacity: 0.75;
        }

        .stat-box .v {
            font-size: 14px;
        }

        .btn {
            display: inline-block;
            padding: 10px 12px;
            background-color: #00796b;
            color: white;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0, 121, 107, 0.2);
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #004d40;
        }

        .btn-wide {
            width: 100%;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 0 auto 12px;
            max-width: 1500px;
        }

        .tab-btn {
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(178, 223, 219, 0.9);
            color: #000;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .tab-btn.active {
            background-color: #00796b;
            border-color: #00796b;
            color: #fff;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        @media (max-width: 600px) {
            .form-row {
                flex-direction: column;
                align-items: stretch;
            }

            .form-row label {
                flex: 1 1 auto;
            }

            input[type="text"],
            input[type="password"] {
                width: 100%;
            }

            .search-row {
                gap: 8px;
            }

            .calc-layout {
                grid-template-columns: 1fr;
            }

            .basic-panel {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .equip-tiles {
                grid-template-columns: 1fr;
            }

            .symbol-tiles {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <!-- JavaScript 动态加载左侧目录 -->
    <div id="sidebar-container"></div>

    <!-- 页面内容区 -->
    <div class="content">
        <h1>属性计算器</h1>
        <p class="subtitle">Nexon Open API</p>

        <div style="max-width: 1500px; margin: 0 auto 12px;">
            <div class="calc-card">
                <div class="search-row">
                    <input type="text" id="characterName" placeholder="请输入角色名字" autocomplete="off" />
                    <button type="button" class="btn" onclick="fetchAndRenderCharacterBasic()">查询角色信息</button>
                </div>
                <div id="nxStatus" class="status" aria-live="polite"></div>
            </div>
        </div>

        <div class="tabs" role="tablist" aria-label="属性计算器标签页">
            <button type="button" class="tab-btn active" id="tabBtnOverview" role="tab" aria-selected="true" aria-controls="tabOverview" onclick="setActiveTab('overview')">角色总览</button>
            <button type="button" class="tab-btn" id="tabBtnEquip" role="tab" aria-selected="false" aria-controls="tabEquip" onclick="setActiveTab('equip')">装备</button>
            <button type="button" class="tab-btn" id="tabBtnSymbol" role="tab" aria-selected="false" aria-controls="tabSymbol" onclick="setActiveTab('symbol')">符文</button>
        </div>

        <div class="calc-layout" id="calcLayout">
            <div class="tab-panel active" id="tabOverview" role="tabpanel" aria-labelledby="tabBtnOverview">
                <div class="calc-card">
                    <div id="characterInfo" class="character-card" style="display:none;">
                        <div class="basic-panel">
                            <img id="characterImage" alt="character image" />
                            <div class="basic-fields">
                                <div class="pill"><span class="label">名字</span><span class="value" id="basicName">-</span></div>
                                <div class="pill"><span class="label">职业</span><span class="value" id="basicClass">-</span></div>
                                <div class="pill"><span class="label">等级</span><span class="value" id="basicLevel">-</span></div>
                                <div class="pill"><span class="label">服务器</span><span class="value" id="basicWorld">-</span></div>
                            </div>
                        </div>

                        <div class="stats-panel">
                            <div class="stats-grid">
                                <div class="stat-box"><span class="k">攻击力</span><span class="v" id="statAttack">-</span></div>
                                <div class="stat-box"><span class="k">最终伤害</span><span class="v" id="statFinalDmg">-</span></div>
                                <div class="stat-box"><span class="k">Arc</span><span class="v" id="statArc">-</span></div>
                                <div class="stat-box"><span class="k">Aut</span><span class="v" id="statAut">-</span></div>
                                <div class="stat-box"><span class="k">STR</span><span class="v" id="statSTR">-</span></div>
                                <div class="stat-box"><span class="k">INT</span><span class="v" id="statINT">-</span></div>
                                <div class="stat-box"><span class="k">DEX</span><span class="v" id="statDEX">-</span></div>
                                <div class="stat-box"><span class="k">LUK</span><span class="v" id="statLUK">-</span></div>
                                <div class="stat-box"><span class="k">HP</span><span class="v" id="statHP">-</span></div>
                                <div class="stat-box"><span class="k">MP</span><span class="v" id="statMP">-</span></div>
                                <div class="stat-box"><span class="k">总伤害</span><span class="v" id="statDmg">-</span></div>
                                <div class="stat-box"><span class="k">BOSS伤害</span><span class="v" id="statBoss">-</span></div>
                                <div class="stat-box"><span class="k">无视</span><span class="v" id="statIED">-</span></div>
                                <div class="stat-box"><span class="k">一般怪物伤害</span><span class="v" id="statNormalMonster">-</span></div>
                                <div class="stat-box"><span class="k">爆率</span><span class="v" id="statCritRate">-</span></div>
                                <div class="stat-box"><span class="k">爆伤</span><span class="v" id="statCritDmg">-</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-panel" id="tabEquip" role="tabpanel" aria-labelledby="tabBtnEquip">
                <div class="calc-card" id="equipCard" style="display:none;">
                    <div class="tabs" role="tablist" aria-label="装备预设">
                        <button type="button" class="tab-btn active" id="equipPresetBtnCurrent" role="tab" aria-selected="true" aria-controls="equipPresetPanel" onclick="setActiveEquipPreset('current')">当前</button>
                        <button type="button" class="tab-btn" id="equipPresetBtn1" role="tab" aria-selected="false" aria-controls="equipPresetPanel" onclick="setActiveEquipPreset('preset1')">预设1</button>
                        <button type="button" class="tab-btn" id="equipPresetBtn2" role="tab" aria-selected="false" aria-controls="equipPresetPanel" onclick="setActiveEquipPreset('preset2')">预设2</button>
                        <button type="button" class="tab-btn" id="equipPresetBtn3" role="tab" aria-selected="false" aria-controls="equipPresetPanel" onclick="setActiveEquipPreset('preset3')">预设3</button>
                    </div>

                    <div id="equipPresetPanel">
                        <div class="equip-tiles" id="equipTiles"></div>
                    </div>
                </div>
            </div>

            <div class="tab-panel" id="tabSymbol" role="tabpanel" aria-labelledby="tabBtnSymbol">
                <div class="calc-card" id="symbolCard" style="display:none;">
                    <div class="symbol-tiles" id="symbolTiles"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 加载侧边栏
        fetch('sidebar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('sidebar-container').innerHTML = data;
            })
            .catch(error => {
                console.error('加载侧边栏失败:', error);
            });

        // JavaScript 控制子菜单的展开和收起
        function toggleSubMenu(id) {
            const submenu = document.getElementById(id);
            if (submenu.style.display === "block") {
                submenu.style.display = "none";
            } else {
                submenu.style.display = "block";
            }
        }

        function loadCharacterNameFromLocalStorage() {
            if (localStorage.getItem("characterName") !== null) {
                document.getElementById("characterName").value = localStorage.getItem("characterName");
            }
        }

        const NX_API_HOST = "https://open.api.nexon.com";
        const NX_API_KEY_HEADER = "x-nxopen-api-key";

        // NOTE: 这只是临时“混淆”，并非真正的安全措施；key 仍可在浏览器端被还原。
        const NX_API_KEY_B64_PARTS = [
            "dGVzdF9lMjNmMjk3NDg4NzM3MzRkZGJhYjYwNzdlN2VjNzc0NjJjMzFjMWFlOTEyZmZlZjE3ZTRjY2Rj",
            "Yzk2NGQyYmM5ZWZlOGQwNGU2ZDIzM2JkMzVjZjJmYWJkZWI5M2ZiMGQ=",
        ];

        function getNxApiKey() {
            const b64 = NX_API_KEY_B64_PARTS.join("");
            if (typeof atob === "function") return atob(b64);
            if (typeof window !== "undefined" && typeof window.atob === "function") return window.atob(b64);
            throw new Error("当前环境不支持 atob()，无法解码 API Key");
        }

        function setNxStatus(message, isError = false) {
            const el = document.getElementById("nxStatus");
            el.textContent = message || "";
            el.classList.toggle("error", Boolean(isError));
        }

        function setCharacterInfoVisible(visible) {
            document.getElementById("characterInfo").style.display = visible ? "block" : "none";
        }

        function setEquipCardVisible(visible) {
            const card = document.getElementById("equipCard");
            if (!card) return;
            card.style.display = visible ? "block" : "none";
        }

        let lastEquipData = null;
        let activeEquipPreset = "current";

        function getEquipItemsByPreset(eq, preset) {
            if (!eq) return [];
            if (preset === "preset1") return Array.isArray(eq?.item_equipment_preset_1) ? eq.item_equipment_preset_1 : [];
            if (preset === "preset2") return Array.isArray(eq?.item_equipment_preset_2) ? eq.item_equipment_preset_2 : [];
            if (preset === "preset3") return Array.isArray(eq?.item_equipment_preset_3) ? eq.item_equipment_preset_3 : [];
            return Array.isArray(eq?.item_equipment) ? eq.item_equipment : [];
        }

        function updateEquipPresetButtons() {
            const btnCurrent = document.getElementById("equipPresetBtnCurrent");
            const btn1 = document.getElementById("equipPresetBtn1");
            const btn2 = document.getElementById("equipPresetBtn2");
            const btn3 = document.getElementById("equipPresetBtn3");

            const configs = [
                { preset: "current", el: btnCurrent },
                { preset: "preset1", el: btn1 },
                { preset: "preset2", el: btn2 },
                { preset: "preset3", el: btn3 },
            ];

            configs.forEach(c => {
                if (!c.el) return;
                const isActive = activeEquipPreset === c.preset;
                c.el.classList.toggle("active", isActive);
                c.el.setAttribute("aria-selected", isActive ? "true" : "false");
            });
        }

        function setActiveEquipPreset(preset) {
            activeEquipPreset = preset || "current";
            updateEquipPresetButtons();
            if (lastEquipData) {
                renderEquipmentTiles(getEquipItemsByPreset(lastEquipData, activeEquipPreset));
            }
        }

        function setActiveTab(tab) {
            const overviewBtn = document.getElementById("tabBtnOverview");
            const equipBtn = document.getElementById("tabBtnEquip");
            const symbolBtn = document.getElementById("tabBtnSymbol");
            const overviewPanel = document.getElementById("tabOverview");
            const equipPanel = document.getElementById("tabEquip");
            const symbolPanel = document.getElementById("tabSymbol");

            const active = tab || "overview";
            const isOverview = active === "overview";
            const isEquip = active === "equip";
            const isSymbol = active === "symbol";

            if (overviewBtn) {
                overviewBtn.classList.toggle("active", isOverview);
                overviewBtn.setAttribute("aria-selected", isOverview ? "true" : "false");
            }
            if (equipBtn) {
                equipBtn.classList.toggle("active", isEquip);
                equipBtn.setAttribute("aria-selected", isEquip ? "true" : "false");
            }
            if (symbolBtn) {
                symbolBtn.classList.toggle("active", isSymbol);
                symbolBtn.setAttribute("aria-selected", isSymbol ? "true" : "false");
            }

            if (overviewPanel) overviewPanel.classList.toggle("active", isOverview);
            if (equipPanel) equipPanel.classList.toggle("active", isEquip);
            if (symbolPanel) symbolPanel.classList.toggle("active", isSymbol);
        }

        function setSymbolCardVisible(visible) {
            const card = document.getElementById("symbolCard");
            if (!card) return;
            card.style.display = visible ? "block" : "none";
        }

        function getSymbolForceLabel(symbolName) {
            const name = (symbolName ?? "").toString();
            if (name.includes("祕法")) return "Arc";
            if (name.includes("真實") || name.includes("真实")) return "Aut";
            return "符文力";
        }

        function renderSymbolTotals(sym) {
            const list = Array.isArray(sym?.symbol) ? sym.symbol : [];

            let arc = 0;
            let aut = 0;

            list.forEach(s => {
                const name = (s?.symbol_name ?? "").toString();
                const force = parseStatNumber(s?.symbol_force);
                const val = Number.isNaN(force) ? 0 : force;

                if (name.includes("祕法") || name.toLowerCase().includes("arcane")) {
                    arc += val;
                } else if (name.includes("真實") || name.includes("真实") || name.toLowerCase().includes("authentic")) {
                    aut += val;
                }
            });

            setText("statArc", arc);
            setText("statAut", aut);
        }

        function renderSymbols(sym) {
            const tiles = document.getElementById("symbolTiles");
            if (!tiles) return;

            const list = Array.isArray(sym?.symbol) ? sym.symbol : [];
            tiles.innerHTML = "";

            if (list.length === 0) {
                setSymbolCardVisible(false);
                return;
            }

            list.forEach(s => {
                const tile = document.createElement("div");
                tile.className = "symbol-tile";

                const header = document.createElement("div");
                header.className = "symbol-header";

                const img = document.createElement("img");
                img.className = "symbol-icon";
                img.alt = (s?.symbol_name ?? "符文").toString();
                if (s?.symbol_icon) img.src = s.symbol_icon;
                header.appendChild(img);

                const meta = document.createElement("div");
                const nameEl = document.createElement("div");
                nameEl.className = "symbol-name";
                nameEl.textContent = (s?.symbol_name ?? "符文").toString();
                meta.appendChild(nameEl);
                header.appendChild(meta);

                tile.appendChild(header);

                const stats = document.createElement("div");
                stats.className = "equip-stat-list";

                if (s?.symbol_level !== undefined && s?.symbol_level !== null) {
                    appendEquipStatLine(stats, "等级", s.symbol_level);
                }
                if (s?.symbol_force) {
                    appendEquipStatLine(stats, getSymbolForceLabel(s?.symbol_name), s.symbol_force);
                }

                const statDefs = [
                    { label: "STR", key: "symbol_str" },
                    { label: "DEX", key: "symbol_dex" },
                    { label: "INT", key: "symbol_int" },
                    { label: "LUK", key: "symbol_luk" },
                    { label: "HP", key: "symbol_hp" },
                ];

                statDefs.forEach(def => {
                    const val = (s?.[def.key] ?? "").toString();
                    const n = parseStatNumber(val);
                    if (!Number.isNaN(n) && n !== 0) {
                        appendEquipStatLine(stats, def.label, val);
                    }
                });

                const drop = (s?.symbol_drop_rate ?? "").toString().trim();
                if (drop && drop !== "0%") appendEquipStatLine(stats, "掉落率", drop);

                const meso = (s?.symbol_meso_rate ?? "").toString().trim();
                if (meso && meso !== "0%") appendEquipStatLine(stats, "金币获取", meso);

                const exp = (s?.symbol_exp_rate ?? "").toString().trim();
                if (exp && exp !== "0%") appendEquipStatLine(stats, "经验获取", exp);

                tile.appendChild(stats);
                tiles.appendChild(tile);
            });

            setSymbolCardVisible(true);
        }

        function setEquipDetailVisible(visible) {
            const panel = document.getElementById("equipDetailPanel");
            if (!panel) return;
            panel.style.display = visible ? "block" : "none";
        }

        function appendEquipStatLine(listEl, key, value) {
            if (!listEl) return;
            const row = document.createElement("div");
            row.className = "equip-stat-row";

            const k = document.createElement("span");
            k.className = "k";
            k.textContent = key;

            const v = document.createElement("span");
            v.className = "v";
            if (value instanceof Node) {
                v.textContent = "";
                v.appendChild(value);
            } else {
                v.textContent = (value === undefined || value === null || String(value).trim().length === 0) ? "-" : String(value);
            }

            row.appendChild(k);
            row.appendChild(v);
            listEl.appendChild(row);
        }

        function fillEquipmentStatsGrid(gridEl, item) {
            if (!gridEl) return;

            const baseOpt = item?.item_base_option;
            const starOpt = item?.item_starforce_option;
            const etcOpt = item?.item_etc_option;
            const addOpt = item?.item_add_option;
            const totalOpt = item?.item_total_option;

            const statDefs = [
                { label: "STR", key: "str", percent: false },
                { label: "DEX", key: "dex", percent: false },
                { label: "INT", key: "int", percent: false },
                { label: "LUK", key: "luk", percent: false },
                { label: "HP", key: "max_hp", percent: false },
                { label: "MP", key: "max_mp", percent: false },
                { label: "攻击力", key: "attack_power", percent: false },
                { label: "魔法攻击力", key: "magic_power", percent: false },
                { label: "伤害", key: "damage", percent: true },
                { label: "BOSS伤害", key: "boss_damage", percent: true },
                { label: "无视防御", key: "ignore_monster_armor", percent: true },
                { label: "全属性", key: "all_stat", percent: true },
                { label: "HP%", key: "max_hp_rate", percent: true },
                { label: "MP%", key: "max_mp_rate", percent: true },
            ];

            statDefs.forEach(def => {
                const base = getOptionNumber(baseOpt, def.key);
                const starforce = getOptionNumber(starOpt, def.key);
                const scroll = getOptionNumber(etcOpt, def.key);
                const add = getOptionNumber(addOpt, def.key);
                const { total, node } = buildEquipBreakdownValue({ base, starforce, scroll, add, percent: def.percent });
                if (total !== 0) {
                    appendEquipStatLine(gridEl, def.label, node);
                    return;
                }

                // 某些装备（如 伊妮絲的寶玉）属性可能只出现在 item_total_option
                const totalOnly = getOptionNumber(totalOpt, def.key);
                if (totalOnly !== 0) {
                    const { node: totalNode } = buildEquipBreakdownValue({ base: totalOnly, starforce: 0, scroll: 0, add: 0, percent: def.percent });
                    appendEquipStatLine(gridEl, def.label, totalNode);
                }
            });

            // 潜能
            const potGrade = (item?.potential_option_grade ?? "").toString().trim();
            const pot = [item?.potential_option_1, item?.potential_option_2, item?.potential_option_3]
                .map(x => (x ?? "").toString().trim())
                .filter(x => x.length > 0);
            if (potGrade || pot.length > 0) {
                if (pot[0]) appendEquipStatLine(gridEl, "潜能1", pot[0]);
                if (pot[1]) appendEquipStatLine(gridEl, "潜能2", pot[1]);
                if (pot[2]) appendEquipStatLine(gridEl, "潜能3", pot[2]);
            }

            const addPotGrade = (item?.additional_potential_option_grade ?? "").toString().trim();
            const addPot = [item?.additional_potential_option_1, item?.additional_potential_option_2, item?.additional_potential_option_3]
                .map(x => (x ?? "").toString().trim())
                .filter(x => x.length > 0);
            if (addPotGrade || addPot.length > 0) {
                if (addPot[0]) appendEquipStatLine(gridEl, "附加潜能1", addPot[0]);
                if (addPot[1]) appendEquipStatLine(gridEl, "附加潜能2", addPot[1]);
                if (addPot[2]) appendEquipStatLine(gridEl, "附加潜能3", addPot[2]);
            }

            // 灵魂
            if (item?.soul_name) appendEquipStatLine(gridEl, "灵魂", item.soul_name);
            if (item?.soul_option) appendEquipStatLine(gridEl, "灵魂选项", item.soul_option);
        }

        function appendStatBox(gridEl, key, value) {
            if (!gridEl) return;
            const box = document.createElement("div");
            box.className = "stat-box";
            const k = document.createElement("span");
            k.className = "k";
            k.textContent = key;
            const v = document.createElement("span");
            v.className = "v";
            if (value instanceof Node) {
                v.textContent = "";
                v.appendChild(value);
            } else {
                v.textContent = (value === undefined || value === null || String(value).trim().length === 0) ? "-" : String(value);
            }
            box.appendChild(k);
            box.appendChild(v);
            gridEl.appendChild(box);
        }

        function isNonZeroStat(value) {
            if (value === undefined || value === null) return false;
            const s = String(value).trim();
            if (s.length === 0) return false;
            const n = parseStatNumber(s);
            if (!Number.isNaN(n)) return n !== 0;
            return s !== "0";
        }

        function withPercentSuffix(value) {
            if (value === undefined || value === null) return value;
            const s = String(value).trim();
            if (s.length === 0) return value;
            if (s.includes("%")) return value;
            return `${s}%`;
        }

        function formatNumberCompact(n) {
            if (typeof n !== "number" || Number.isNaN(n)) return "0";
            if (Number.isInteger(n)) return String(n);
            return String(n);
        }

        function formatSigned(n, { percent = false } = {}) {
            const numText = formatNumberCompact(n);
            const sign = (typeof n === "number" && !Number.isNaN(n) && n > 0) ? "+" : "";
            const suffix = percent ? "%" : "";
            return `${sign}${numText}${suffix}`;
        }

        function getOptionNumber(obj, key) {
            if (!obj) return 0;
            const n = parseStatNumber(obj?.[key]);
            return Number.isNaN(n) ? 0 : n;
        }

        function buildEquipBreakdownValue({ base, starforce, scroll, add, percent = false }) {
            const total = base + starforce + scroll + add;

            const root = document.createElement("span");
            root.className = "equip-breakdown";

            const totalText = document.createElement("span");
            totalText.textContent = formatSigned(total, { percent });
            root.appendChild(totalText);

            // 只有 base 时，不展示括号分解
            if (starforce === 0 && scroll === 0 && add === 0) {
                return { total, node: root };
            }

            root.appendChild(document.createTextNode(" "));

            const wrap = document.createElement("span");
            wrap.appendChild(document.createTextNode("("));

            const parts = [
                { cls: "part-base", value: base },
                { cls: "part-starforce", value: starforce },
                { cls: "part-scroll", value: scroll },
                { cls: "part-add", value: add },
            ].filter(p => p.value !== 0);

            if (parts.length === 0) {
                const only = document.createElement("span");
                only.className = "part-base";
                only.textContent = percent ? "0%" : "0";
                wrap.appendChild(only);
            } else {
                parts.forEach((p, idx) => {
                    const el = document.createElement("span");
                    el.className = p.cls;
                    if (idx === 0) {
                        // 第一个分段不强制加 '+'（对齐示例：132 +131 ...）
                        el.textContent = percent ? `${formatNumberCompact(p.value)}%` : `${formatNumberCompact(p.value)}`;
                    } else {
                        el.textContent = ` ${formatSigned(p.value, { percent })}`;
                    }
                    wrap.appendChild(el);
                });
            }

            wrap.appendChild(document.createTextNode(")"));
            root.appendChild(wrap);
            return { total, node: root };
        }

        function renderEquipmentDetail(item) {
            const titleEl = document.getElementById("equipDetailTitle");
            const gridEl = document.getElementById("equipDetailGrid");
            if (!titleEl || !gridEl) return;

            const name = (item?.item_name ?? "").toString().trim();
            const slot = (item?.item_equipment_slot ?? "").toString().trim();
            titleEl.textContent = name ? `${name}${slot ? `（${slot}）` : ""}` : "装备属性";

            gridEl.innerHTML = "";
            fillEquipmentStatsGrid(gridEl, item);

            setEquipDetailVisible(true);
        }

        function setText(id, value) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = (value === undefined || value === null || String(value).length === 0) ? "-" : String(value);
        }

        function buildStatIndex(finalStat) {
            const index = new Map();
            (Array.isArray(finalStat) ? finalStat : []).forEach(s => {
                const name = s?.stat_name;
                const value = s?.stat_value;
                if (name) index.set(String(name), value);
            });
            return index;
        }

        function findStatValue(index, candidates) {
            for (const name of candidates) {
                if (index.has(name)) return index.get(name);
            }
            for (const [key, val] of index.entries()) {
                if (candidates.some(c => key.includes(c))) return val;
            }
            return undefined;
        }

        function renderBasic(basic) {
            setText("basicName", basic?.character_name);
            setText("basicWorld", basic?.world_name);
            setText("basicClass", basic?.character_class);
            setText("basicLevel", basic?.character_level);

            const img = document.getElementById("characterImage");
            img.src = basic?.character_image || "";
            img.style.display = basic?.character_image ? "block" : "none";
        }

        function parseStatNumber(value) {
            if (value === undefined || value === null) return Number.NaN;
            const s = String(value).replaceAll(",", "");
            const match = s.match(/-?\d+(?:\.\d+)?/);
            return match ? Number(match[0]) : Number.NaN;
        }

        function parsePositiveInt(value) {
            const n = parseStatNumber(value);
            if (Number.isNaN(n) || n <= 0) return 0;
            return Math.floor(n);
        }

        function getEquipGradeClass(potentialGrade) {
            const g = (potentialGrade ?? "").toString().trim();
            if (!g) return "";

            // 同时兼容繁/简
            if (g === "特殊") return "grade-special";
            if (g === "稀有") return "grade-rare";
            if (g === "罕见" || g === "罕見") return "grade-epic";
            if (g === "传说" || g === "傳說") return "grade-legendary";
            return "";
        }

        function renderStat(stat) {
            const index = buildStatIndex(stat?.final_stat);

            // 攻击力：使用「攻擊力」与「魔法攻擊力」中较大的值
            const atk = findStatValue(index, ["攻擊力", "攻击力"]);
            const matk = findStatValue(index, ["魔法攻擊力", "魔法攻击力"]);
            const atkNum = parseStatNumber(atk);
            const matkNum = parseStatNumber(matk);

            let atkText = "-";
            if (Number.isNaN(matkNum) || (!Number.isNaN(atkNum) && atkNum >= matkNum)) {
                atkText = atk ?? String(atkNum);
            } else {
                atkText = matk ?? String(matkNum);
            }
            setText("statAttack", atkText);

            const finalDmg = findStatValue(index, ["最終傷害", "最终伤害", "最終傷害增加", "最终伤害增加"]);
            setText("statFinalDmg", finalDmg);

            setText("statSTR", findStatValue(index, ["STR"]));
            setText("statDEX", findStatValue(index, ["DEX"]));
            setText("statINT", findStatValue(index, ["INT"]));
            setText("statLUK", findStatValue(index, ["LUK"]));
            setText("statHP", findStatValue(index, ["HP"]));
            setText("statMP", findStatValue(index, ["MP"]));

            const boss = findStatValue(index, ["BOSS怪物傷害"]);
            setText("statBoss", boss);

            // “伤害”避免匹配到 BOSS 伤害
            let dmg = findStatValue(index, ["傷害"]);
            if (dmg === boss) {
                dmg = undefined;
            }
            setText("statDmg", dmg);

            setText("statIED", findStatValue(index, ["無視防禦率", "无视防御率", "無視防禦", "无视防御"]));
            setText("statCritRate", findStatValue(index, ["爆擊率", "暴击率", "爆击几率", "暴击几率", "爆擊機率", "暴擊機率"]));
            setText("statCritDmg", findStatValue(index, ["爆擊傷害", "暴击伤害", "爆击伤害"]));
            setText("statNormalMonster", findStatValue(index, ["一般怪物傷害"]));
        }

        function renderEquipmentTiles(items) {
            const tiles = document.getElementById("equipTiles");
            if (!tiles) return;
            const list = Array.isArray(items) ? items : [];

            tiles.innerHTML = "";

            list.forEach(item => {
                const name = item?.item_name || "";
                const icon = item?.item_icon || "";
                const gradeClass = getEquipGradeClass(item?.potential_option_grade);

                // const slot = (item?.item_equipment_slot ?? "").toString().trim();

                const tile = document.createElement("div");
                tile.className = "equip-tile";
                if (gradeClass) tile.classList.add(gradeClass);

                const header = document.createElement("div");
                header.className = "equip-tile-header";

                const img = document.createElement("img");
                img.className = "equip-icon";
                img.alt = name || "item";
                if (icon) img.src = icon;
                header.appendChild(img);

                const meta = document.createElement("div");
                const nameEl = document.createElement("div");
                nameEl.className = "equip-tile-name";

                const scrollUp = parsePositiveInt(item?.scroll_upgrade);
                const starforce = parsePositiveInt(item?.starforce);
                const enhanceText = `${scrollUp > 0 ? `+${scrollUp}` : ""}${starforce > 0 ? `(${starforce}星)` : ""}`;

                const baseName = name ? `${name}${enhanceText}` : (enhanceText ? enhanceText : "装备");
                nameEl.textContent = baseName;
                meta.appendChild(nameEl);

                header.appendChild(meta);
                tile.appendChild(header);

                const statsGrid = document.createElement("div");
                statsGrid.className = "equip-stat-list";
                fillEquipmentStatsGrid(statsGrid, item);
                tile.appendChild(statsGrid);

                tiles.appendChild(tile);
            });
        }

        function renderEquipment(eq) {
            const panel = document.getElementById("equipCard");
            if (!panel) return;

            lastEquipData = eq;

            const hasAnyItems = (
                getEquipItemsByPreset(eq, "current").length > 0 ||
                getEquipItemsByPreset(eq, "preset1").length > 0 ||
                getEquipItemsByPreset(eq, "preset2").length > 0 ||
                getEquipItemsByPreset(eq, "preset3").length > 0
            );

            if (!hasAnyItems) {
                setEquipCardVisible(false);
                return;
            }

            setEquipCardVisible(true);

            // 默认展示“当前”
            activeEquipPreset = "current";
            updateEquipPresetButtons();
            renderEquipmentTiles(getEquipItemsByPreset(eq, activeEquipPreset));

        }

        async function nxFetchJson(path, apiKey, params = {}) {
            const url = new URL(path, NX_API_HOST);
            Object.entries(params).forEach(([key, value]) => {
                if (value !== undefined && value !== null && String(value).length > 0) {
                    url.searchParams.set(key, String(value));
                }
            });

            const resp = await fetch(url.toString(), {
                method: "GET",
                headers: {
                    [NX_API_KEY_HEADER]: apiKey,
                },
            });

            const contentType = resp.headers.get("content-type") || "";
            const bodyText = await resp.text();
            const maybeJson = contentType.includes("application/json") ? (() => {
                try {
                    return JSON.parse(bodyText);
                } catch {
                    return null;
                }
            })() : null;

            if (!resp.ok) {
                const apiMessage = maybeJson && (maybeJson.error?.message || maybeJson.message);
                const extra = apiMessage ? `\n${apiMessage}` : (bodyText ? `\n${bodyText}` : "");
                throw new Error(`HTTP ${resp.status} ${resp.statusText}${extra}`);
            }

            if (maybeJson === null) {
                throw new Error("API 返回非 JSON 响应");
            }
            return maybeJson;
        }

        async function fetchAndRenderCharacterBasic() {
            // const apiKey = (document.getElementById("nxApiKey").value || "").trim();
            const apiKey = getNxApiKey();
            const name = (document.getElementById("characterName").value || "").trim();

            setCharacterInfoVisible(false);
            setEquipCardVisible(false);
            setSymbolCardVisible(false);
            setText("statArc", "-");
            setText("statAut", "-");

            if (!apiKey) {
                setNxStatus("请先输入 API Key", true);
                return;
            }
            if (!name) {
                setNxStatus("请先输入角色名字", true);
                return;
            }

            localStorage.setItem("characterName", name);

            try {
                setNxStatus("查询中…");

                const idData = await nxFetchJson("/maplestorytw/v1/id", apiKey, {
                    character_name: name,
                });

                const ocid = idData?.ocid;
                if (!ocid) {
                    throw new Error("角色可能不存在或 API 返回异常");
                }

                const basic = await nxFetchJson("/maplestorytw/v1/character/basic", apiKey, {
                    ocid,
                });

                const stat = await nxFetchJson("/maplestorytw/v1/character/stat", apiKey, {
                    ocid,
                });

                const eq = await nxFetchJson("/maplestorytw/v1/character/item-equipment", apiKey, {
                    ocid,
                });

                let sym = null;
                try {
                    sym = await nxFetchJson("/maplestorytw/v1/character/symbol-equipment", apiKey, {
                        ocid,
                    });
                } catch (e) {
                    console.warn("符文查询失败", e);
                }

                renderBasic(basic);
                renderStat(stat);
                renderEquipment(eq);
                renderSymbols(sym);
                renderSymbolTotals(sym);
                setCharacterInfoVisible(true);
                setNxStatus("完成");
            } catch (err) {
                console.error(err);
                setNxStatus(String(err?.message || err || "查询失败"), true);
            }
        }

        window.onload = () => {
            loadCharacterNameFromLocalStorage();
            setActiveTab("overview");
        };
    </script>
